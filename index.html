<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Radio Player | Profesional</title>
    <!-- Google Fonts për tipografi profesionale -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0b0c10;
            --card-bg: rgba(18, 22, 35, 0.85);
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.4);
            --text-light: #f0f4fa;
            --text-muted: #9ca3af;
            --border-color: rgba(59, 130, 246, 0.3);
            --transition: all 0.25s ease;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Inter', sans-serif;
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* Kontejneri kryesor */
        .app-container {
            max-width: 780px;
            width: 100%;
            margin: 0 auto;
        }

        /* Kartela kryesore */
        .radio-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(59, 130, 246, 0.1);
            overflow: hidden;
            transition: var(--transition);
        }

        /* Header */
        .header {
            text-align: center;
            padding: 2rem 1.5rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(120deg, #fff, var(--primary));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 0.25rem;
        }
        .sub {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Zona e playerit */
        .player-area {
            padding: 1.5rem;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .now-playing {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--primary);
            background: rgba(59, 130, 246, 0.15);
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            margin-bottom: 1rem;
            backdrop-filter: blur(4px);
        }
        audio {
            width: 100%;
            border-radius: 60px;
            background: #1e243b;
            outline: none;
        }
        audio::-webkit-media-controls-panel {
            background-color: #1e243b;
        }

        /* Selektori i vendeve */
        .select-wrapper {
            padding: 0 1.5rem 1rem 1.5rem;
        }
        select {
            width: 100%;
            padding: 0.9rem 1.2rem;
            background: #111827;
            border: 1px solid var(--border-color);
            border-radius: 60px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='%233b82f6' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 1.2rem center;
            background-size: 1.2rem;
        }
        select:hover {
            border-color: var(--primary);
            background-color: #0f172a;
        }
        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        /* Gridi i stacioneve */
        .stations-grid {
            padding: 1rem 1.5rem 1.8rem;
        }
        .grid-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }
        .radio-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 0.8rem;
        }
        .radio-btn {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 0.9rem 0.5rem;
            border-radius: 1.5rem;
            font-weight: 500;
            font-size: 0.9rem;
            color: #e2e8f0;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .radio-btn:hover {
            background: var(--primary);
            border-color: transparent;
            transform: translateY(-2px);
            color: white;
            box-shadow: 0 8px 20px -6px var(--primary-glow);
        }
        .radio-btn.active {
            background: var(--primary);
            border-color: transparent;
            color: white;
            box-shadow: 0 0 12px var(--primary-glow);
        }
        /* ikonë e vogël për radio */
        .radio-btn::before {
            content: "📻";
            font-size: 1rem;
            opacity: 0.7;
        }
        .radio-btn.active::before {
            content: "▶️";
            opacity: 1;
        }

        /* Mesazh gabimi */
        .error-message {
            margin: 0 1.5rem 1.5rem;
            padding: 0.8rem 1rem;
            background: rgba(239, 68, 68, 0.15);
            border-left: 4px solid #ef4444;
            border-radius: 12px;
            font-size: 0.85rem;
            color: #fecaca;
        }

        /* footer */
        .footer {
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-muted);
            padding: 1rem 1.5rem 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* animacion loading */
        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }

        @media (max-width: 500px) {
            .radio-buttons {
                grid-template-columns: 1fr 1fr;
            }
            .header h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="radio-card">
        <div class="header">
            <h1>WAVE RADIO</h1>
            <div class="sub">Stacione profesionale · Live stream</div>
        </div>

        <div class="player-area">
            <div class="now-playing" id="currentTitle">Zgjidh një radio</div>
            <audio id="audioPlayer" controls preload="none">
                <source src="" type="audio/mpeg">
                Browseri juaj nuk mbështet audion.
            </audio>
        </div>

        <div class="select-wrapper">
            <select id="countrySelect">
                <option value="">🌍 Zgjidh vendin</option>
            </select>
        </div>

        <div class="stations-grid">
            <div class="grid-title">🎙 STACIONET NË DISPOZICION</div>
            <div id="radioContainer" class="radio-buttons">
                <div class="loading">Ngarko të dhënat...</div>
            </div>
        </div>

        <div id="errorMessage" class="error-message" style="display: none;"></div>
        <div class="footer">
            © Radio Player Professional • Stream direkt nga radios.json
        </div>
    </div>
</div>

<script>
    const audioPlayer = document.getElementById('audioPlayer');
    const currentTitle = document.getElementById('currentTitle');
    const countrySelect = document.getElementById('countrySelect');
    const radioContainer = document.getElementById('radioContainer');
    const errorDiv = document.getElementById('errorMessage');

    let radiosData = {};

    async function loadRadios() {
        try {
            radioContainer.innerHTML = '<div class="loading">📡 Duke ngarkuar stacionet...</div>';
            const response = await fetch('radios.json');
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            radiosData = await response.json();
            populateCountries();
            radioContainer.innerHTML = ''; // do të mbushet kur të zgjidhet vendi
        } catch (err) {
            errorDiv.style.display = 'block';
            errorDiv.innerHTML = `⚠️ Gabim: Nuk u ngarkua radios.json. Kontrollo që skedari ekziston në të njëjtën dosje. Detaje: ${err.message}`;
            radioContainer.innerHTML = '<div style="color:#f87171; text-align:center;">❓ Nuk mund të ngarkohen të dhënat.</div>';
            console.error(err);
        }
    }

    function populateCountries() {
        countrySelect.innerHTML = '<option value="">🌍 Zgjidh vendin</option>';
        Object.keys(radiosData).forEach(country => {
            const option = document.createElement('option');
            option.value = country;
            option.textContent = country;
            countrySelect.appendChild(option);
        });
    }

    function showRadios(country) {
        radioContainer.innerHTML = '';
        if (!country || !radiosData[country]) {
            radioContainer.innerHTML = '<div style="text-align:center; color:#9ca3af;">📭 Zgjidh një vend për të parë stacionet</div>';
            return;
        }

        const stations = radiosData[country];
        stations.forEach(([name, url]) => {
            const btn = document.createElement('button');
            btn.className = 'radio-btn';
            btn.textContent = name;
            btn.onclick = () => playRadio(name, url, btn);
            radioContainer.appendChild(btn);
        });
    }

    function playRadio(name, url, btn) {
        audioPlayer.src = url;
        audioPlayer.play().catch(e => {
            console.warn("Autoplay i bllokuar nga browseri:", e);
            currentTitle.innerHTML = `🎵 ${name} (kliko play për të filluar)`;
        });
        currentTitle.innerHTML = `🎵 Duke luajtur: ${name}`;

        // përditëso gjendjen aktive
        document.querySelectorAll('.radio-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    countrySelect.addEventListener('change', (e) => {
        showRadios(e.target.value);
        // Nëse ndërrohet vendi, ndalo audion dhe pastro titullin aktiv?
        audioPlayer.pause();
        audioPlayer.src = '';
        currentTitle.innerHTML = 'Zgjidh një radio';
        document.querySelectorAll('.radio-btn').forEach(b => b.classList.remove('active'));
    });

    // fillo
    loadRadios();
</script>
</body>
</html>
