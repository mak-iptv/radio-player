<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<title>Radio Player</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; }
h2 { margin-top: 30px; }
.radio-list { margin-bottom: 20px; }
button { margin: 5px 0; padding: 8px 12px; cursor: pointer; }
</style>
</head>
<body>
<h1>Radio Player</h1>

<select id="countrySelect">
    <option value="">Zgjidh vendin</option>
</select>

<div id="radioContainer"></div>

<script>
// Load radios.json
async function loadRadios() {
    const res = await fetch('radios.json');
    const data = await res.json();
    return data;
}

function createButton(name, url) {
    const btn = document.createElement('button');
    btn.textContent = name;
    btn.onclick = () => {
        window.open(url); // hap në VLC/MX Player
    };
    return btn;
}

function populateCountries(radios) {
    const select = document.getElementById('countrySelect');
    for (const country in radios) {
        const option = document.createElement('option');
        option.value = country;
        option.textContent = country;
        select.appendChild(option);
    }
}

function showRadios(radios, country) {
    const container = document.getElementById('radioContainer');
    container.innerHTML = '';
    if (!country || !radios[country]) return;
    const list = document.createElement('div');
    list.className = 'radio-list';
    radios[country].forEach(([name, url]) => {
        const btn = createButton(name, url);
        list.appendChild(btn);
        list.appendChild(document.createElement('br'));
    });
    container.appendChild(list);
}

async function init() {
    const radios = await loadRadios();
    populateCountries(radios);
    const select = document.getElementById('countrySelect');
    select.addEventListener('change', () => {
        showRadios(radios, select.value);
    });
}

init();
</script>
</body>
</html>
