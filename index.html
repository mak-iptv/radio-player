<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wave Radio HD | Player Shqip & Ballkan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --accent: #60a5fa;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
        }
        body {
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
            font-family: 'Inter', sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container { max-width: 900px; width: 100%; }
        
        /* Glass Card */
        .player-card {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        /* Header */
        .header { padding: 30px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); position: relative; }
        .logo { font-size: 2rem; font-weight: 800; letter-spacing: -1px; color: #fff; }
        .logo span { color: var(--primary); }

        /* Now Playing */
        .now-playing {
            display: flex; align-items: center; gap: 20px;
            padding: 20px 30px; background: rgba(0,0,0,0.2);
            margin: 20px; border-radius: 1.5rem;
        }
        .cover-art { 
            width: 80px; height: 80px; border-radius: 1rem; 
            background: #334155; display: flex; align-items: center; 
            justify-content: center; font-size: 2rem; overflow: hidden;
            border: 2px solid var(--primary);
        }
        .cover-art img { width: 100%; height: 100%; object-fit: cover; }
        .track-info { flex: 1; }
        .track-title { font-size: 1.2rem; font-weight: 700; display: block; }
        .track-status { font-size: 0.85rem; color: var(--primary); font-weight: 600; text-transform: uppercase; }

        /* Controls */
        .controls { padding: 10px 30px 30px; }
        audio { width: 100%; filter: invert(100%) hue-rotate(180deg) brightness(1.5); }

        /* Selection Area */
        .selection-grid { padding: 0 30px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        select, input {
            background: #0f172a; border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 15px; border-radius: 12px; color: white; outline: none;
        }

        /* Radio Grid */
        .radio-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px; padding: 20px 30px 40px; max-height: 400px; overflow-y: auto;
        }
        .radio-item {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            padding: 15px; border-radius: 15px; cursor: pointer; text-align: center;
            transition: 0.3s; font-size: 0.9rem; font-weight: 500;
        }
        .radio-item:hover, .radio-item.active {
            background: var(--primary); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        @media (max-width: 600px) {
            .selection-grid { grid-template-columns: 1fr; }
            .radio-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="player-card">
        <div class="header">
            <div class="logo">WAVE<span>RADIO</span></div>
            <p style="color: var(--text-dim); font-size: 0.8rem; margin-top: 5px;">HD Live Streaming</p>
        </div>

        <div class="now-playing">
            <div class="cover-art" id="coverArt">
                <i class="fas fa-radio" id="defaultIcon"></i>
                <img id="artistImg" style="display:none">
            </div>
            <div class="track-info">
                <span class="track-status" id="statusText">Gati</span>
                <span class="track-title" id="currentStationName">Zgjidh një stacion</span>
            </div>
        </div>

        <div class="controls">
            <audio id="mainAudio" controls></audio>
        </div>

        <div class="selection-grid">
            <select id="countryFilter"></select>
            <input type="text" id="searchInput" placeholder="Kërko radio...">
        </div>

        <div class="radio-grid" id="radioGrid"></div>
        
        <div style="text-align: center; padding-bottom: 20px; font-size: 0.7rem; color: var(--text-dim);">
            &copy; 2026 Wave Radio Player - Shqipëri & Ballkan
        </div>
    </div>
</div>

<script>
    const radiosData = {
        "Shqipëri / Kosovë": [
            ["Radio Shqip", "https://cp1.sednastream.com/proxy/radioshqip?mp=/stream"],
            ["Radio Mergimi", "https://mars.streamerr.co/8114/stream"],
            ["My Music Radio", "https://live.top-media.al/mmr"],
            ["Radio Shqip Folklor", "http://85.215.168.56:8010/folklor"],
            ["Top Albania Radio", "https://live.top-media.al/tar"],
            ["Radio Club FM", "https://cp1.sednastream.com/proxy/clubfm?mp=/stream"],
            ["Klan Radio", "https://klanradio.tvklan.al/live/klanmusicradio1/playlist.m3u8"]
        ],
        "Bullgaria": [
            ["Radio Fresh", "https://stream.rcast.net/71094"],
            ["NRJ Bulgaria", "https://play.global.audio/nrj.aac"],
            ["Energy 89.5", "https://play.global.audio/energy-00shi.aac"],
            ["The Voice BG", "https://nova-radio.neterra.tv/thevoice"]
        ],
        "Maqedoni": [
            ["Radio Bubamara", "https://stream.bubamara.com.mk/live"],
            ["Antenna 5", "http://antenna5stream.neotel.mk:8000/live128"],
            ["City Radio", "http://176.9.117.123:9998/live"]
        ],
        "Bosna": [
            ["Radio Mix", "https://stream.rsgmedia.ba/listen/radio_mix/radio.mp3"],
            ["Kalman Radio", "http://188.40.62.20:8004/stream"],
            ["BN Radio", "https://stream.radiobn.net/"]
        ],
        "Serbi": [
            ["Naxi Radio", "https://naxi64ssl.streaming.rs:9162/;stream.nsv"],
            ["Pink Radio", "https://edge9.pink.rs/pinkstream"],
            ["OK Radio", "https://stream1.okradio.net/"]
        ],
        "Hrvatska": [
            ["Otvoreni Radio", "https://stream2.otvoreni.hr/otvoreni"],
            ["Extra FM", "http://streams.extrafm.hr:8110/"],
            ["Radio Banovina", "https://audio.radio-banovina.hr:9998/stream"]
        ],
        "Montenegro": [
            ["Radio D plus", "https://radiodplus.radioca.st/xstream"],
            ["Elmag Radio", "https://radio.elmag.me/elmag.mp3"]
        ]
    };

    const audio = document.getElementById('mainAudio');
    const radioGrid = document.getElementById('radioGrid');
    const countryFilter = document.getElementById('countryFilter');
    const searchInput = document.getElementById('searchInput');
    const stationNameDisplay = document.getElementById('currentStationName');
    const statusText = document.getElementById('statusText');
    const artistImg = document.getElementById('artistImg');
    const defaultIcon = document.getElementById('defaultIcon');

    // Inicializimi i Dropdown
    function init() {
        Object.keys(radiosData).forEach(country => {
            let opt = document.createElement('option');
            opt.value = country;
            opt.textContent = country;
            countryFilter.appendChild(opt);
        });
        renderRadios("Shqipëri / Kosovë");
    }

    // Shfaqja e radiove
    function renderRadios(country, filter = "") {
        radioGrid.innerHTML = "";
        let stations = radiosData[country] || [];
        
        stations.forEach(station => {
            if (station[0].toLowerCase().includes(filter.toLowerCase())) {
                let div = document.createElement('div');
                div.className = 'radio-item';
                div.textContent = station[0];
                div.onclick = () => playRadio(station[1], station[0]);
                radioGrid.appendChild(div);
            }
        });
    }

    // Funksioni Play
    async function playRadio(url, name) {
        audio.src = url;
        audio.play();
        stationNameDisplay.textContent = name;
        statusText.textContent = "Duke Luajtur...";
        
        // Gjej foto per radion (iTunes API)
        try {
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(name)}&limit=1`);
            const data = await res.json();
            if (data.results.length > 0) {
                artistImg.src = data.results[0].artworkUrl100.replace('100x100', '300x300');
                artistImg.style.display = 'block';
                defaultIcon.style.display = 'none';
            } else {
                artistImg.style.display = 'none';
                defaultIcon.style.display = 'block';
            }
        } catch (e) {
            artistImg.style.display = 'none';
            defaultIcon.style.display = 'block';
        }
    }

    // Eventet
    countryFilter.onchange = (e) => renderRadios(e.target.value);
    searchInput.oninput = (e) => renderRadios(countryFilter.value, e.target.value);

    init();
</script>

</body>
</html>
