<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wave Radio HD | Player Shqip & Ballkan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --accent: #60a5fa;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
        }
        body {
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
            font-family: 'Inter', sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container { max-width: 900px; width: 100%; }
        
        .player-card {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .header { padding: 30px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-size: 2rem; font-weight: 800; letter-spacing: -1px; color: #fff; }
        .logo span { color: var(--primary); }

        .now-playing {
            display: flex; align-items: center; gap: 20px;
            padding: 20px 30px; background: rgba(0,0,0,0.2);
            margin: 20px; border-radius: 1.5rem;
        }
        .cover-art { 
            width: 80px; height: 80px; border-radius: 1rem; 
            background: #334155; display: flex; align-items: center; 
            justify-content: center; font-size: 2rem; overflow: hidden;
            border: 2px solid var(--primary); flex-shrink: 0;
        }
        .cover-art img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        
        .track-info { flex: 1; overflow: hidden; }
        .track-status { font-size: 0.85rem; color: var(--primary); font-weight: 600; text-transform: uppercase; }
        
        /* Marquee Efekti */
        .marquee-container { width: 100%; overflow: hidden; position: relative; height: 30px; }
        .track-title { 
            font-size: 1.2rem; 
            font-weight: 700; 
            position: absolute;
            white-space: nowrap;
            will-change: transform;
            animation: marquee 15s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .controls { padding: 10px 30px 30px; }
        audio { width: 100%; filter: invert(100%) hue-rotate(180deg) brightness(1.5); }

        .selection-grid { padding: 0 30px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        select, input {
            background: #0f172a; border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 15px; border-radius: 12px; color: white; outline: none; width: 100%;
        }

        .radio-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px; padding: 20px 30px 40px; max-height: 400px; overflow-y: auto;
        }
        .radio-item {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            padding: 15px; border-radius: 15px; cursor: pointer; text-align: center;
            transition: 0.3s; font-size: 0.9rem; font-weight: 500;
        }
        .radio-item:hover { background: var(--primary); transform: translateY(-3px); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        @media (max-width: 600px) {
            .selection-grid { grid-template-columns: 1fr; }
            .radio-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="player-card">
        <div class="header">
            <div class="logo">WAVE<span>RADIO</span></div>
            <p style="color: var(--text-dim); font-size: 0.8rem; margin-top: 5px;">HD Live Streaming</p>
        </div>

        <div class="now-playing">
            <div class="cover-art" id="coverArt">
                <i class="fas fa-compact-disc fa-spin" id="defaultIcon" style="display:none"></i>
                <i class="fas fa-radio" id="radioIcon"></i>
                <img id="artistImg" style="display:none">
            </div>
            <div class="track-info">
                <span class="track-status" id="statusText">Gati</span>
                <div class="marquee-container">
                    <span class="track-title" id="currentStationName">Zgjidh një stacion radio...</span>
                </div>
            </div>
        </div>

        <div class="controls">
            <audio id="mainAudio" crossorigin="anonymous" controls></audio>
        </div>

        <div class="selection-grid">
            <select id="countryFilter"></select>
            <input type="text" id="searchInput" placeholder="Kërko radion...">
        </div>

        <div class="radio-grid" id="radioGrid"></div>
        
        <div style="text-align: center; padding-bottom: 20px; font-size: 0.7rem; color: var(--text-dim);">
            &copy; 2026 Wave Radio Player - Audio Engine v3.0
        </div>
    </div>
</div>

<script>
    // Të dhënat e tua mbeten të njëjta (i kam shkurtuar këtu për hapësirë)
    const radiosData = {
        "Shqipëri / Kosovë": [
            ["Radio Shqip", "https://cp1.sednastream.com/proxy/radioshqip?mp=/stream"],
            ["Radio Mergimi", "https://mars.streamerr.co/8114/stream"],
            ["My Music Radio", "https://live.top-media.al/mmr"],
            ["Top Albania Radio", "https://live.topgold.al/tar"],
            ["Club FM", "https://cp1.sednastream.com/proxy/clubfm?mp=/stream"],
            ["Radio One", "https://cp1.sednastream.com/proxy/radioone94?mp=/stream"]
            // Shto të tjerat këtu siç i kive...
        ],
        "Maqedoni": [ ["Radio Bubamara", "https://stream.bubamara.com.mk/live"] ],
        "Bosna": [ ["Radio Mix", "https://stream.rsgmedia.ba/listen/radio_mix/radio.mp3"] ]
    };

   const audio = document.getElementById('mainAudio');
const radioGrid = document.getElementById('radioGrid');
const countryFilter = document.getElementById('countryFilter');
const searchInput = document.getElementById('searchInput');
const stationNameDisplay = document.getElementById('currentStationName');
const statusText = document.getElementById('statusText');
const artistImg = document.getElementById('artistImg');
const defaultIcon = document.getElementById('defaultIcon');

let GLOBAL_RADIOS = {}; // Këtu do ruhen radiot nga JSON

async function init() {
    try {
        // 1. Merr të dhënat nga skedari JSON
        const response = await fetch('radios.json');
        GLOBAL_RADIOS = await response.json();

        // 2. Mbush dropdown-in me shtetet
        Object.keys(GLOBAL_RADIOS).forEach(country => {
            let opt = document.createElement('option');
            opt.value = country;
            opt.textContent = country;
            countryFilter.appendChild(opt);
        });

        // 3. Shfaq listën e parë (psh: Shqipëri)
        renderRadios(Object.keys(GLOBAL_RADIOS)[0]);

    } catch (error) {
        console.error("Gabim gjatë ngarkimit të JSON:", error);
        statusText.textContent = "Gabim në server!";
    }
}

function renderRadios(country, filter = "") {
    radioGrid.innerHTML = "";
    const stations = GLOBAL_RADIOS[country] || [];
    
    stations.forEach(station => {
        const name = station[0];
        const url = station[1];
        
        if (name.toLowerCase().includes(filter.toLowerCase())) {
            let div = document.createElement('div');
            div.className = 'radio-item';
            div.textContent = name;
            div.onclick = () => playRadio(url, name);
            radioGrid.appendChild(div);
        }
    });
}

async function playRadio(url, name) {
    audio.src = url;
    audio.play();
    
    stationNameDisplay.textContent = name;
    statusText.textContent = "Duke u lidhur...";
    
    // Provon të gjejë titullin/foton nga iTunes
    fetchMetadata(name);
}

async function fetchMetadata(name) {
    try {
        const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(name)}&limit=1`);
        const data = await res.json();
        
        if (data.results.length > 0) {
            artistImg.src = data.results[0].artworkUrl100.replace('100x100', '300x300');
            artistImg.style.display = 'block';
            defaultIcon.style.display = 'none';
            statusText.textContent = "Live Now";
        } else {
            artistImg.style.display = 'none';
            defaultIcon.style.display = 'block';
        }
    } catch (e) {
        artistImg.style.display = 'none';
        defaultIcon.style.display = 'block';
    }
}

// Eventet e filtrave
countryFilter.onchange = (e) => renderRadios(e.target.value);
searchInput.oninput = (e) => renderRadios(countryFilter.value, e.target.value);

// Nis aplikacionin
init();
</script>

</body>
</html>
