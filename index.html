<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<title>Radio Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
  background: #111;
  color: white;
  font-family: Arial;
  text-align: center;
}

select, button {
  padding: 10px;
  margin: 10px;
  font-size: 16px;
}

audio {
  margin-top: 20px;
  width: 80%;
}
</style>
</head>

<body>

<h2>🎧 Radio Player</h2>

<select id="category"></select>
<select id="radio"></select>

<br>

<button onclick="playRadio()">▶ Play</button>
<button onclick="stopRadio()">⏹ Stop</button>

<br>

<audio id="audio" controls></audio>

<script>
let data;
let audio = document.getElementById("audio");
let hls;

// Load JSON
fetch("radio.json")
  .then(res => res.json())
  .then(json => {
    data = json;
    loadCategories();
  });

function loadCategories() {
  let cat = document.getElementById("category");
  cat.innerHTML = "";

  Object.keys(data).forEach(c => {
    let opt = document.createElement("option");
    opt.value = c;
    opt.textContent = c;
    cat.appendChild(opt);
  });

  loadRadios();
}

function loadRadios() {
  let cat = document.getElementById("category").value;
  let radios = document.getElementById("radio");

  radios.innerHTML = "";

  data[cat].forEach(r => {
    let opt = document.createElement("option");
    opt.value = r[1];
    opt.textContent = r[0];
    radios.appendChild(opt);
  });
}

document.getElementById("category").addEventListener("change", loadRadios);

function playRadio() {
  let url = document.getElementById("radio").value;

  if (hls) {
    hls.destroy();
    hls = null;
  }

  // HLS (.m3u8)
  if (url.includes(".m3u8")) {
    if (Hls.isSupported()) {
      hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(audio);
      hls.on(Hls.Events.MANIFEST_PARSED, function () {
        audio.play();
      });
    } else if (audio.canPlayType("application/vnd.apple.mpegurl")) {
      audio.src = url;
      audio.play();
    }
  } 
  else {
    // MP3 / AAC
    audio.src = url;
    audio.play().catch(e => {
      alert("❌ Nuk mund të luhet ky stream në browser");
      console.log(e);
    });
  }
}

function stopRadio() {
  audio.pause();
  audio.src = "";
  if (hls) {
    hls.destroy();
    hls = null;
  }
}
</script>

</body>
</html>
