<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Wave Radio | Player HD Shqip</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Përdor stilet e tua ekzistuese këtu (i kam mbajtur të njëjtat për konsistencë) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-gradient: linear-gradient(135deg, #0b1120 0%, #0a0f1a 100%);
            --card-bg: rgba(15, 25, 45, 0.75);
            --primary: #3b82f6;
            --text-light: #f1f5f9;
            --text-muted: #94a3b8;
            --border-glow: rgba(59, 130, 246, 0.3);
            --transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        body {
            background: var(--bg-gradient);
            font-family: 'Inter', sans-serif;
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .radio-app { max-width: 1000px; width: 100%; margin: 0 auto; }
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }
        .app-header { padding: 1.8rem 2rem 1rem; text-align: center; position: relative; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .logo { font-size: 2.2rem; font-weight: 800; background: linear-gradient(120deg, #fff, var(--primary)); -webkit-background-clip: text; color: transparent; }
        .now-playing-card {
            background: rgba(0, 0, 0, 0.4); margin: 1.5rem 2rem 0; border-radius: 1.5rem;
            padding: 1.2rem; display: flex; align-items: center; gap: 1.2rem; border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .artist-image { width: 70px; height: 70px; border-radius: 1.2rem; object-fit: cover; border: 1px solid var(--border-glow); }
        .fallback-icon { width: 70px; height: 70px; border-radius: 1.2rem; display: flex; align-items: center; justify-content: center; font-size: 2rem; background: #1e293b; border: 1px solid var(--border-glow); }
        .track-info { flex: 1; overflow: hidden; }
        .track-name { font-weight: 700; font-size: 1.3rem; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { color: var(--primary); font-weight: 500; }
        .audio-wrapper { padding: 1rem 2rem; }
        audio { width: 100%; height: 45px; }
        .select-region { padding: 0.5rem 2rem; }
        .custom-select { width: 100%; padding: 0.8rem; background: #0f172a; border: 1px solid var(--border-glow); border-radius: 60px; color: white; appearance: none; }
        .stations-area { padding: 1.2rem 2rem 1.8rem; }
        .stations-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 0.8rem; }
        .station-btn { background: rgba(15, 23, 42, 0.7); border: 1px solid rgba(59, 130, 246, 0.2); padding: 0.8rem; border-radius: 1.2rem; color: white; cursor: pointer; text-align: center; transition: var(--transition); }
        .station-btn:hover, .station-btn.active { background: var(--primary); transform: translateY(-2px); }
        .apk-button { position: absolute; top: 1.5rem; right: 1.5rem; background: rgba(59,130,246,0.2); border-radius: 40px; padding: 0.4rem 1rem; color: var(--primary); text-decoration: none; font-size: 0.75rem; }
    </style>
</head>
<body>

<div class="radio-app">
    <div class="glass-card">
        <div class="app-header">
            <div class="logo"><i class="fas fa-wave-square"></i> WAVE RADIO</div>
            <a href="#" class="apk-button"><i class="fab fa-android"></i> APK</a>
        </div>

        <div class="now-playing-card">
            <div id="imageContainer">
                <div class="fallback-icon" id="artistFallback"><i class="fas fa-music"></i></div>
                <img id="artistImage" class="artist-image" style="display: none;">
            </div>
            <div class="track-info">
                <div class="track-name" id="trackTitle">Zgjidh një radio</div>
                <div class="track-artist" id="trackArtist">Prisni...</div>
            </div>
        </div>

        <div class="audio-wrapper">
            <audio id="audioPlayer" controls></audio>
        </div>

        <div class="select-region">
            <select id="countrySelect" class="custom-select"></select>
        </div>

        <div class="stations-area">
            <div id="radioContainer" class="stations-grid"></div>
        </div>
    </div>
</div>

<script>
    const audio = document.getElementById('audioPlayer');
    const trackTitle = document.getElementById('trackTitle');
    const trackArtist = document.getElementById('trackArtist');
    const artistImg = document.getElementById('artistImage');
    const fallback = document.getElementById('artistFallback');
    const radioContainer = document.getElementById('radioContainer');
    const countrySelect = document.getElementById('countrySelect');

    // Këtu vendosen të dhënat e radiove (Default stations që kishit)
   async function loadRadios() {
    try {
        const response = await fetch('radios.json');
        const radiosData = await response.json();
        
        // Funksioni për të mbushur dropdown-in me shtete
        populateCountries(radiosData);
        
        console.log("Listat e radiove u ngarkuan me sukses!");
    } catch (error) {
        console.error("Gabim gjatë ngarkimit të radios.json:", error);
    }
}

function populateCountries(data) {
    const select = document.getElementById('countrySelect');
    Object.keys(data).forEach(country => {
        let opt = document.createElement('option');
        opt.value = country;
        opt.innerHTML = country;
        select.appendChild(opt);
    });
    
    // Ngarko shtetin e parë si default
    showRadios(Object.keys(data)[0], data);
}

// Thirr funksionin kur hapet faqja
loadRadios();
    // Populimi i shteteve
    Object.keys(radiosData).forEach(country => {
        let opt = document.createElement('option');
        opt.value = country;
        opt.innerHTML = country;
        countrySelect.appendChild(opt);
    });

    countrySelect.onchange = (e) => loadStations(e.target.value);

    function loadStations(country) {
        radioContainer.innerHTML = '';
        radiosData[country].forEach(station => {
            let btn = document.createElement('div');
            btn.className = 'station-btn';
            btn.innerHTML = station[0];
            btn.onclick = () => playRadio(station[1], station[0]);
            radioContainer.appendChild(btn);
        });
    }

    function playRadio(url, name) {
        audio.src = url;
        audio.play().catch(() => alert("Kliko Play manualisht (Autoplay u bllokua)"));
        trackTitle.innerHTML = name;
        trackArtist.innerHTML = "Duke u lidhur...";
        updateMetadata(name);
    }

    // Funksioni për gjetjen e këngës dhe fotos
    async function updateMetadata(stationName) {
        // Shënim: Ky funksion në web-browser kërkon që serveri i radios 
        // të ketë një JSON API. Meqë shumica e radiove nuk e lejojnë leximin e titujve 
        // direkt nga stream në JS (për shkak të CORS), përdorim emrin e radios.
        
        // Kërkimi i fotos në iTunes bazuar në emrin e radios ose këngës
        try {
            const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(stationName)}&limit=1`);
            const data = await res.json();
            if (data.results.length > 0) {
                artistImg.src = data.results[0].artworkUrl100.replace('100x100', '300x300');
                artistImg.style.display = 'block';
                fallback.style.display = 'none';
            } else {
                artistImg.style.display = 'none';
                fallback.style.display = 'flex';
            }
        } catch (e) {
            console.log("Imazhi nuk u gjet");
        }
        trackArtist.innerHTML = "Live Streaming";
    }

    // Ngarko shtetin e parë automatikisht
    loadStations(Object.keys(radiosData)[0]);

</script>
</body>
</html>
