<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Player Moderne</title>
    <style>
        :root {
            --primary: #00d2ff;
            --bg: #1a1a2e;
            --card: #16213e;
            --text: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 { color: var(--primary); margin-bottom: 30px; }

        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background: var(--card);
            color: white;
            border: 1px solid var(--primary);
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
        }

        .player-section {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            border-bottom: 4px solid var(--primary);
            width: 100%;
        }

        audio { width: 100%; margin-top: 10px; }

        #radioContainer {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            width: 100%;
        }

        .radio-btn {
            background: var(--card);
            color: white;
            border: 1px solid #30475e;
            padding: 15px 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60px;
        }

        .radio-btn:hover {
            background: var(--primary);
            color: #000;
            transform: translateY(-3px);
        }

        .radio-btn.active {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 15px var(--primary);
        }

        .now-playing {
            font-size: 0.9em;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .error {
            color: #ff6b6b;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Radio Player 📻</h1>

    <div class="player-section">
        <div class="now-playing" id="currentTitle">Zgjidhni një radio...</div>
        <audio id="audioPlayer" controls autoplay>
            Browseri juaj nuk mbështet elementin audio.
        </audio>
    </div>

    <select id="countrySelect">
        <option value="">🌍 Zgjidh vendin</option>
    </select>

    <div id="radioContainer"></div>
    <div id="errorMessage" class="error"></div>
</div>

<script>
const audioPlayer = document.getElementById('audioPlayer');
const currentTitle = document.getElementById('currentTitle');
const countrySelect = document.getElementById('countrySelect');
const radioContainer = document.getElementById('radioContainer');
const errorDiv = document.getElementById('errorMessage');

let radiosData = {}; // do të mbushet nga JSON

// Ngarko të dhënat nga radios.json
async function loadRadios() {
    try {
        const response = await fetch('radios.json');
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        radiosData = await response.json();
        populateCountries();
    } catch (err) {
        errorDiv.textContent = `Gabim gjatë ngarkimit të radios.json: ${err.message}. Kontrollo që skedari ekziston dhe është i vlefshëm.`;
        console.error(err);
    }
}

// Popullo dropdown-in me vendet
function populateCountries() {
    countrySelect.innerHTML = '<option value="">🌍 Zgjidh vendin</option>';
    Object.keys(radiosData).forEach(country => {
        const option = document.createElement('option');
        option.value = country;
        option.textContent = country;
        countrySelect.appendChild(option);
    });
}

// Shfaq butonat e radiosh për vendin e zgjedhur
function showRadios(country) {
    radioContainer.innerHTML = '';
    if (!country || !radiosData[country]) return;

    radiosData[country].forEach(([name, url]) => {
        const btn = document.createElement('button');
        btn.className = 'radio-btn';
        btn.textContent = name;
        btn.onclick = () => playRadio(name, url, btn);
        radioContainer.appendChild(btn);
    });
}

// Luaj radion
function playRadio(name, url, btn) {
    audioPlayer.src = url;
    audioPlayer.play().catch(e => {
        console.warn("Autoplay i bllokuar:", e);
        currentTitle.textContent = `Kliko 'Play' për të dëgjuar: ${name}`;
    });
    currentTitle.textContent = `Duke luajtur: ${name}`;

    // Hiq klasën active nga të gjithë butonat
    document.querySelectorAll('.radio-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

// Kur ndryshon vendi
countrySelect.addEventListener('change', (e) => {
    showRadios(e.target.value);
});

// Fillo aplikacionin
loadRadios();
</script>

</body>
</html>
