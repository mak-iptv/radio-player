<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Wave Radio | Player HD</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-gradient: linear-gradient(135deg, #0b1120 0%, #0a0f1a 100%);
            --card-bg: rgba(15, 25, 45, 0.75);
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --text-light: #f1f5f9;
            --text-muted: #94a3b8;
            --border-glow: rgba(59, 130, 246, 0.3);
            --transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        body {
            background: var(--bg-gradient);
            font-family: 'Inter', sans-serif;
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .radio-app {
            max-width: 960px;
            width: 100%;
            margin: 0 auto;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(59, 130, 246, 0.1);
            overflow: hidden;
        }

        .app-header {
            padding: 1.8rem 2rem 1rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(120deg, #fff, var(--primary));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .tagline {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.4rem;
        }

        /* Now Playing Card */
        .now-playing-card {
            background: rgba(0, 0, 0, 0.4);
            margin: 1.5rem 2rem 0;
            border-radius: 1.5rem;
            padding: 1.2rem;
            display: flex;
            align-items: center;
            gap: 1.2rem;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .artwork {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.5);
            border: 1px solid var(--border-glow);
        }

        .track-info {
            flex: 1;
        }

        .track-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 0.2rem;
        }

        .track-name {
            font-weight: 700;
            font-size: 1.3rem;
            line-height: 1.3;
            color: white;
        }

        .track-artist {
            font-size: 0.9rem;
            color: var(--primary);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .live-badge {
            font-size: 0.7rem;
            background: rgba(239, 68, 68, 0.2);
            padding: 0.2rem 0.7rem;
            border-radius: 40px;
            color: #f87171;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .refresh-btn {
            background: rgba(59,130,246,0.2);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            color: var(--primary);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .refresh-btn:hover {
            background: var(--primary);
            color: white;
            transform: rotate(15deg);
        }

        .audio-wrapper {
            padding: 1rem 2rem 0.5rem;
        }

        audio {
            width: 100%;
            border-radius: 60px;
            outline: none;
        }

        .select-region {
            padding: 0.5rem 2rem;
        }

        .custom-select {
            width: 100%;
            padding: 0.8rem 1.2rem;
            background: #0f172a;
            border: 1px solid var(--border-glow);
            border-radius: 60px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='18' height='18' viewBox='0 0 24 24' fill='none' stroke='%233b82f6' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 1.2rem center;
        }

        .stations-area {
            padding: 1.2rem 2rem 1.8rem;
        }

        .stations-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
        }

        .stations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 0.8rem;
        }

        .station-btn {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 0.8rem 0.5rem;
            border-radius: 1.2rem;
            font-weight: 500;
            font-size: 0.85rem;
            color: #e2e8f0;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .station-btn:hover, .station-btn.active {
            background: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -8px var(--primary-glow);
            border-color: transparent;
        }

        .loader-small {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(59,130,246,0.3);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg {
            background: rgba(239,68,68,0.1);
            border-left: 3px solid #ef4444;
            padding: 0.6rem 1rem;
            margin: 0 2rem 1rem;
            border-radius: 12px;
            font-size: 0.8rem;
            color: #fecaca;
        }

        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-muted);
            padding: 1rem 2rem 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        @media (max-width: 560px) {
            .stations-grid { grid-template-columns: 1fr 1fr; }
            .now-playing-card { margin: 1rem; padding: 0.9rem; }
            .artwork { width: 55px; height: 55px; font-size: 1.5rem; }
            .track-name { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="radio-app">
    <div class="glass-card">
        <div class="app-header">
            <div class="logo"><i class="fas fa-waveform"></i> WAVE RADIO</div>
            <div class="tagline">HD Radio · Artist & kënga në kohë reale</div>
        </div>

        <div class="now-playing-card">
            <div class="artwork" id="artworkIcon"><i class="fas fa-headphones"></i></div>
            <div class="track-info">
                <div class="track-label">TANI NË AJËR</div>
                <div class="track-name" id="nowPlayingTrack">Zgjidh një radio</div>
                <div class="track-artist" id="nowPlayingArtist">—</div>
            </div>
            <button class="refresh-btn" id="refreshMetadataBtn" title="Rifresko këngën"><i class="fas fa-sync-alt"></i></button>
        </div>

        <div class="audio-wrapper">
            <audio id="audioPlayer" controls preload="none"></audio>
        </div>

        <div class="select-region">
            <select id="countrySelect" class="custom-select">
                <option value="">🌍 Zgjidh vendin</option>
            </select>
        </div>

        <div class="stations-area">
            <div class="stations-header">
                <span><i class="fas fa-tower-broadcast"></i> STACIONET RADIO</span>
                <span id="stationCount"></span>
            </div>
            <div id="radioContainer" class="stations-grid">
                <div class="station-btn" style="justify-content:center;"><i class="fas fa-spinner fa-pulse"></i> Duke ngarkuar...</div>
            </div>
        </div>

        <div id="errorMessage" class="error-msg" style="display: none;"></div>
        <div class="footer-note">
            <i class="fas fa-music"></i> Informacioni merret nga Radio Browser API • Përditësohet çdo 30 sekonda
        </div>
    </div>
</div>

<script>
    // DOM elements
    const audioPlayer = document.getElementById('audioPlayer');
    const nowPlayingTrack = document.getElementById('nowPlayingTrack');
    const nowPlayingArtist = document.getElementById('nowPlayingArtist');
    const countrySelect = document.getElementById('countrySelect');
    const radioContainer = document.getElementById('radioContainer');
    const stationCountSpan = document.getElementById('stationCount');
    const errorDiv = document.getElementById('errorMessage');
    const refreshBtn = document.getElementById('refreshMetadataBtn');
    const artworkIcon = document.getElementById('artworkIcon');

    let radiosData = {};
    let currentStationUrl = '';
    let currentStationName = '';
    let metadataInterval = null;

    // Fallback stations if radios.json missing
    const DEFAULT_STATIONS = {
        "Shqipëri": [
            ["Top Albania Radio", "https://radio.albanianstream.com/topalbania"],
            ["Radio Tirana", "https://icecast.rts.al/radiotirana"],
            ["Club FM", "https://stream.clubfm.al/clubfm"]
        ],
        "Kosovë": [
            ["Radio Kosova", "https://mp3.rtklive.com/ks/"],
            ["Urban FM", "https://stream.urbanfm.al/urbanfm"]
        ]
    };

    // ========== METADATA FETCH (multiple servers) ==========
    async function fetchMetadataFromAPI(stationUrl) {
        const servers = ['de1', 'nl1', 'fr1']; // different Radio Browser mirrors
        for (const server of servers) {
            try {
                const encodedUrl = encodeURIComponent(stationUrl);
                const response = await fetch(`https://${server}.api.radio-browser.info/json/stations/byurl/${encodedUrl}`);
                if (!response.ok) continue;
                const stations = await response.json();
                if (stations && stations.length > 0) {
                    return stations[0];
                }
            } catch (e) {
                console.warn(`${server} API failed`, e);
            }
        }
        return null;
    }

    async function fetchCurrentTrack(stationUrl, stationName, showLoading = true) {
        if (!stationUrl) return;

        if (showLoading) {
            nowPlayingArtist.innerHTML = `<i class="loader-small"></i> Duke marrë të dhëna...`;
            artworkIcon.innerHTML = '<i class="fas fa-spinner fa-pulse"></i>';
        }

        try {
            const stationData = await fetchMetadataFromAPI(stationUrl);
            if (stationData && stationData.song) {
                let song = stationData.song;
                // Try to split artist - title
                if (song.includes(' - ')) {
                    const [artist, title] = song.split(' - ');
                    nowPlayingArtist.textContent = artist.trim();
                    nowPlayingTrack.textContent = title.trim() || stationName;
                } else if (song.includes(' – ')) {
                    const [artist, title] = song.split(' – ');
                    nowPlayingArtist.textContent = artist.trim();
                    nowPlayingTrack.textContent = title.trim() || stationName;
                } else {
                    // If no separator, show whole string as title
                    nowPlayingTrack.textContent = song;
                    nowPlayingArtist.textContent = stationName;
                }
                artworkIcon.innerHTML = '<i class="fas fa-music"></i>';
            } else {
                // No metadata from API
                nowPlayingTrack.textContent = stationName;
                nowPlayingArtist.textContent = "🎵 Informacion në dispozicion?";
                artworkIcon.innerHTML = '<i class="fas fa-microphone-alt"></i>';
            }
        } catch (err) {
            console.error("Metadata fetch error:", err);
            nowPlayingTrack.textContent = stationName;
            nowPlayingArtist.textContent = "⚠️ Nuk mund të merrej kënga";
            artworkIcon.innerHTML = '<i class="fas fa-exclamation-triangle"></i>';
        }
    }

    function manualRefresh() {
        if (currentStationUrl) {
            fetchCurrentTrack(currentStationUrl, currentStationName, true);
            refreshBtn.style.transform = 'rotate(360deg)';
            setTimeout(() => { refreshBtn.style.transform = ''; }, 500);
        }
    }

    function startMetadataInterval() {
        if (metadataInterval) clearInterval(metadataInterval);
        if (currentStationUrl && !audioPlayer.paused) {
            metadataInterval = setInterval(() => {
                fetchCurrentTrack(currentStationUrl, currentStationName, false);
            }, 30000);
        }
    }

    function stopMetadataInterval() {
        if (metadataInterval) {
            clearInterval(metadataInterval);
            metadataInterval = null;
        }
    }

    // ========== RADIO LIST ==========
    async function loadRadios() {
        try {
            radioContainer.innerHTML = `<div class="station-btn" style="justify-content:center;"><i class="fas fa-spinner fa-pulse"></i> Po ngarkohen stacionet...</div>`;
            const res = await fetch('radios.json');
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            radiosData = await res.json();
            if (Object.keys(radiosData).length === 0) throw new Error('empty');
        } catch (err) {
            console.warn("radios.json not found, using defaults", err);
            radiosData = DEFAULT_STATIONS;
            errorDiv.style.display = 'block';
            errorDiv.innerHTML = `⚠️ Skedari radios.json nuk u gjet. Duke përdorur stacione shembull. Krijo një skedar radios.json për të shtuar më shumë.`;
            setTimeout(() => { errorDiv.style.display = 'none'; }, 5000);
        } finally {
            populateCountries();
            radioContainer.innerHTML = '';
            if (Object.keys(radiosData).length === 0) {
                radioContainer.innerHTML = '<div class="station-btn">❌ Asnjë stacion</div>';
            }
        }
    }

    function populateCountries() {
        countrySelect.innerHTML = '<option value="">🌍 Zgjidh vendin</option>';
        Object.keys(radiosData).sort().forEach(country => {
            const option = document.createElement('option');
            option.value = country;
            option.textContent = country;
            countrySelect.appendChild(option);
        });
    }

    function showRadios(country) {
        radioContainer.innerHTML = '';
        if (!country || !radiosData[country]) {
            radioContainer.innerHTML = '<div class="station-btn" style="justify-content:center;">📭 Zgjidh një vend më lart</div>';
            stationCountSpan.textContent = '';
            return;
        }
        const stations = radiosData[country];
        stationCountSpan.textContent = `${stations.length} stacione`;
        stations.forEach(([name, url]) => {
            const btn = document.createElement('button');
            btn.className = 'station-btn';
            btn.innerHTML = `<i class="fas fa-play-circle"></i> ${name}`;
            btn.onclick = () => playRadio(name, url, btn);
            radioContainer.appendChild(btn);
        });
    }

    function playRadio(name, url, btn) {
        stopMetadataInterval();
        if (currentStationUrl !== url) {
            audioPlayer.src = url;
            audioPlayer.play().catch(e => console.warn("Autoplay blocked", e));
        } else {
            audioPlayer.play().catch(e => console.log(e));
        }

        currentStationUrl = url;
        currentStationName = name;

        nowPlayingTrack.textContent = name;
        nowPlayingArtist.innerHTML = `<i class="loader-small"></i> Duke marrë këngën...`;
        artworkIcon.innerHTML = '<i class="fas fa-spinner fa-pulse"></i>';

        fetchCurrentTrack(url, name, true);
        startMetadataInterval();

        document.querySelectorAll('.station-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // Country change handler
    countrySelect.addEventListener('change', (e) => {
        showRadios(e.target.value);
        audioPlayer.pause();
        audioPlayer.src = '';
        nowPlayingTrack.textContent = 'Zgjidh një radio';
        nowPlayingArtist.textContent = '—';
        artworkIcon.innerHTML = '<i class="fas fa-headphones"></i>';
        document.querySelectorAll('.station-btn').forEach(b => b.classList.remove('active'));
        currentStationUrl = '';
        stopMetadataInterval();
    });

    refreshBtn.addEventListener('click', manualRefresh);
    window.addEventListener('beforeunload', () => stopMetadataInterval());

    loadRadios();
</script>
</body>
</html>
