<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Wave Radio | Player Profesional</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (Ikonat) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-gradient: linear-gradient(135deg, #0b1120 0%, #0a0f1a 100%);
            --card-bg: rgba(15, 25, 45, 0.75);
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --text-light: #f1f5f9;
            --text-muted: #94a3b8;
            --border-glow: rgba(59, 130, 246, 0.3);
            --transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        body {
            background: var(--bg-gradient);
            font-family: 'Inter', sans-serif;
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            backdrop-filter: blur(2px);
        }

        /* Kontejneri kryesor */
        .radio-app {
            max-width: 880px;
            width: 100%;
            margin: 0 auto;
        }

        /* Kartela kryesore */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(59, 130, 246, 0.1);
            overflow: hidden;
            transition: var(--transition);
        }

        /* Header */
        .app-header {
            padding: 1.8rem 2rem 1rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .logo {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(120deg, #fff, var(--primary));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .logo i {
            background: none;
            color: var(--primary);
            font-size: 1.8rem;
        }
        .tagline {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.4rem;
            letter-spacing: 1px;
        }

        /* Zona e playerit të avancuar */
        .player-section {
            padding: 1.5rem 2rem;
            background: rgba(0, 0, 0, 0.25);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .now-playing-info {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            flex-wrap: wrap;
            margin-bottom: 1.2rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 1.5rem;
            padding: 0.8rem 1.2rem;
        }
        .track-art {
            width: 55px;
            height: 55px;
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
            border: 1px solid rgba(59,130,246,0.3);
        }
        .track-details {
            flex: 1;
        }
        .track-name {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: -0.2px;
            color: white;
        }
        .track-artist {
            font-size: 0.8rem;
            color: var(--primary);
            margin-top: 0.2rem;
        }
        .live-badge {
            font-size: 0.7rem;
            background: rgba(239, 68, 68, 0.2);
            padding: 0.2rem 0.6rem;
            border-radius: 40px;
            color: #f87171;
            display: inline-block;
        }

        /* Audio player i personalizuar */
        audio {
            width: 100%;
            border-radius: 60px;
            margin-top: 0.5rem;
            outline: none;
        }
        audio::-webkit-media-controls-panel {
            background-color: #0f172a;
        }

        /* Dropdown i vendeve */
        .select-region {
            padding: 0.5rem 2rem 0 2rem;
        }
        .custom-select {
            width: 100%;
            padding: 0.8rem 1.2rem;
            background: #0f172a;
            border: 1px solid var(--border-glow);
            border-radius: 60px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='18' height='18' viewBox='0 0 24 24' fill='none' stroke='%233b82f6' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 1.2rem center;
        }
        .custom-select:hover, .custom-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
            outline: none;
        }

        /* Lista e stacioneve */
        .stations-area {
            padding: 1.2rem 2rem 1.8rem;
        }
        .stations-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
        }
        .stations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 0.8rem;
        }
        .station-btn {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 0.8rem 0.5rem;
            border-radius: 1.2rem;
            font-weight: 500;
            font-size: 0.85rem;
            color: #e2e8f0;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            backdrop-filter: blur(4px);
        }
        .station-btn i {
            font-size: 0.9rem;
            opacity: 0.7;
        }
        .station-btn:hover {
            background: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -8px var(--primary-glow);
            border-color: transparent;
        }
        .station-btn.active {
            background: var(--primary);
            border-color: transparent;
            box-shadow: 0 0 12px var(--primary-glow);
        }

        /* animacion loading */
        .loader, .track-loader {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(59,130,246,0.3);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg {
            background: rgba(239,68,68,0.1);
            border-left: 3px solid #ef4444;
            padding: 0.6rem 1rem;
            border-radius: 12px;
            margin: 0 2rem 1.2rem;
            font-size: 0.8rem;
            color: #fecaca;
        }

        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-muted);
            padding: 1rem 2rem 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        @media (max-width: 560px) {
            .stations-grid { grid-template-columns: 1fr 1fr; }
            .player-section { padding: 1rem; }
            .track-art { width: 45px; height: 45px; font-size: 1.4rem; }
        }
    </style>
</head>
<body>
<div class="radio-app">
    <div class="glass-card">
        <div class="app-header">
            <div class="logo">
                <i class="fas fa-waveform"></i> WAVE RADIO
            </div>
            <div class="tagline">HD Radio · Tani në ajër me metadata</div>
        </div>

        <div class="player-section">
            <div class="now-playing-info">
                <div class="track-art"><i class="fas fa-microphone-alt"></i></div>
                <div class="track-details">
                    <div class="track-name" id="nowPlayingTrack">Zgjidh një radio</div>
                    <div class="track-artist" id="nowPlayingArtist">—</div>
                </div>
                <div class="live-badge"><i class="fas fa-circle" style="font-size: 0.6rem; color: #ef4444;"></i> LIVE</div>
            </div>
            <audio id="audioPlayer" controls preload="none">
                <source src="" type="audio/mpeg">
                Shfletuesi juaj nuk e mbështet elementin audio.
            </audio>
        </div>

        <div class="select-region">
            <select id="countrySelect" class="custom-select">
                <option value="">🌍 Zgjidh vendin</option>
            </select>
        </div>

        <div class="stations-area">
            <div class="stations-header">
                <span><i class="fas fa-tower-broadcast"></i> STACIONET RADIO</span>
                <span id="stationCount"></span>
            </div>
            <div id="radioContainer" class="stations-grid">
                <div class="station-btn" style="justify-content:center; background:transparent;"><i class="fas fa-spinner fa-pulse"></i> Duke ngarkuar...</div>
            </div>
        </div>

        <div id="errorMessage" class="error-msg" style="display: none;"></div>
        <div class="footer-note">
            <i class="fas fa-headphones"></i> Informacioni i këngës merret nga Radio Browser API
        </div>
    </div>
</div>

<script>
    const audioPlayer = document.getElementById('audioPlayer');
    const nowPlayingTrack = document.getElementById('nowPlayingTrack');
    const nowPlayingArtist = document.getElementById('nowPlayingArtist');
    const countrySelect = document.getElementById('countrySelect');
    const radioContainer = document.getElementById('radioContainer');
    const stationCountSpan = document.getElementById('stationCount');
    const errorDiv = document.getElementById('errorMessage');

    let radiosData = {};
    let currentStationUrl = '';
    let currentStationName = '';

    // ===================== RADIO BROWSER API: Marrja e këngës aktuale =====================
    async function fetchCurrentTrack(stationUrl, stationName) {
        if (!stationUrl) return;
        try {
            // Endpoint për të kërkuar stacionin sipas URL-së
            const encodedUrl = encodeURIComponent(stationUrl);
            const response = await fetch(`https://de1.api.radio-browser.info/json/stations/byurl/${encodedUrl}`);
            if (!response.ok) throw new Error('API e pamundur');
            const stations = await response.json();
            if (stations && stations.length > 0) {
                const station = stations[0];
                let song = station.song || station.lastcheckok ? station.name : null;
                if (song && song !== '') {
                    // Shumë stacione e japin si "Artist - Titull"
                    if (song.includes(' - ')) {
                        const [artist, title] = song.split(' - ');
                        nowPlayingArtist.textContent = artist.trim();
                        nowPlayingTrack.textContent = title.trim() || stationName;
                    } else {
                        nowPlayingTrack.textContent = song;
                        nowPlayingArtist.textContent = stationName;
                    }
                } else {
                    nowPlayingTrack.textContent = stationName;
                    nowPlayingArtist.textContent = "Metadata nuk disponohet";
                }
            } else {
                nowPlayingTrack.textContent = stationName;
                nowPlayingArtist.textContent = "Pa informacion live";
            }
        } catch (err) {
            console.warn("Nuk u morën metadata:", err);
            nowPlayingTrack.textContent = stationName;
            nowPlayingArtist.textContent = "Kënga në radio (live)";
        }
    }

    // ===================== FUNKSIONET KRYESORE =====================
    async function loadRadios() {
        try {
            radioContainer.innerHTML = `<div class="station-btn" style="justify-content:center;"><i class="fas fa-spinner fa-pulse"></i> Po ngarkohen stacionet...</div>`;
            const res = await fetch('radios.json');
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            radiosData = await res.json();
            populateCountries();
            radioContainer.innerHTML = '';
        } catch (err) {
            errorDiv.style.display = 'block';
            errorDiv.innerHTML = `⚠️ Gabim: Nuk u gjet ose u ngarkua radios.json. Kontrollo që skedari ekziston në të njëjtën dosje. Detaje: ${err.message}`;
            radioContainer.innerHTML = '<div style="text-align:center; padding:1rem;">❓ Nuk mund të lexohen të dhënat.</div>';
            console.error(err);
        }
    }

    function populateCountries() {
        countrySelect.innerHTML = '<option value="">🌍 Zgjidh vendin</option>';
        Object.keys(radiosData).forEach(country => {
            const option = document.createElement('option');
            option.value = country;
            option.textContent = country;
            countrySelect.appendChild(option);
        });
    }

    function showRadios(country) {
        radioContainer.innerHTML = '';
        if (!country || !radiosData[country]) {
            radioContainer.innerHTML = '<div class="station-btn" style="justify-content:center; background:transparent;">📭 Zgjidh një vend më lart</div>';
            stationCountSpan.textContent = '';
            return;
        }
        const stations = radiosData[country];
        stationCountSpan.textContent = `${stations.length} stacione`;
        stations.forEach(([name, url]) => {
            const btn = document.createElement('button');
            btn.className = 'station-btn';
            btn.innerHTML = `<i class="fas fa-play-circle"></i> ${name}`;
            btn.onclick = () => playRadio(name, url, btn);
            radioContainer.appendChild(btn);
        });
    }

    function playRadio(name, url, btn) {
        // Nëse ndërrohet radio, ndrysho burimin dhe luaj
        if (audioPlayer.src !== url) {
            audioPlayer.src = url;
            audioPlayer.play().catch(e => {
                console.warn("Autoplay i bllokuar, kliko play manualisht", e);
                nowPlayingTrack.textContent = name;
                nowPlayingArtist.textContent = "Kliko play për të dëgjuar";
            });
        } else {
            audioPlayer.play().catch(e => console.log(e));
        }

        currentStationUrl = url;
        currentStationName = name;

        // Përditëso pamjen e titullit ndërsa merren metadata
        nowPlayingTrack.textContent = name;
        nowPlayingArtist.innerHTML = `<i class="fas fa-spinner fa-pulse" style="font-size:0.7rem;"></i> Duke marrë këngën...`;

        // Thirr API për metadata (tregon kush këndon)
        fetchCurrentTrack(url, name);

        // Heq klasën active nga të gjithë butonat dhe e vendos te aktivi
        document.querySelectorAll('.station-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // Ndryshimi i vendit – ndalo audion dhe pastro metadata
    countrySelect.addEventListener('change', (e) => {
        showRadios(e.target.value);
        audioPlayer.pause();
        audioPlayer.src = '';
        nowPlayingTrack.textContent = 'Zgjidh një radio';
        nowPlayingArtist.textContent = '—';
        document.querySelectorAll('.station-btn').forEach(b => b.classList.remove('active'));
        currentStationUrl = '';
    });

    // Nëse audio përfundon (error), shfaq mesazh
    audioPlayer.addEventListener('error', () => {
        nowPlayingArtist.textContent = "Stream i padisponueshëm";
    });

    // Inicializimi
    loadRadios();
</script>
</body>
</html>
