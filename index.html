<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Player</title>

<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  display:flex;
  height:100vh;
}

.sidebar {
  width:280px;
  background:#111;
  overflow-y:auto;
  padding:10px;
}

.search {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border:none;
  border-radius:10px;
}

.station {
  display:flex;
  align-items:center;
  padding:10px;
  cursor:pointer;
  border-bottom:1px solid #222;
}

.station img {
  width:40px;
  height:40px;
  border-radius:50%;
  margin-right:10px;
}

.station:hover {
  background:#222;
}

.player {
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.player img {
  width:120px;
  border-radius:20px;
  margin-bottom:10px;
}

button {
  padding:12px 25px;
  margin:5px;
  border:none;
  border-radius:50px;
  background:#00c6ff;
  cursor:pointer;
  font-size:16px;
}
</style>
</head>

<body>

<div class="sidebar">
  <input type="text" id="search" class="search" placeholder="🔍 Kërko radio...">
  <div id="stations"></div>
</div>

<div class="player">
  <img id="logo" src="">
  <h2 id="radioName">Zgjidh një radio</h2>
  <audio id="audio" controls autoplay crossorigin="anonymous"></audio>
  <div>
    <button onclick="audio.play()">▶️</button>
    <button onclick="audio.pause()">⏸️</button>
  </div>
</div>

<script>
const audio = document.getElementById("audio");
let allStations = [];

fetch("radios.json")
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("stations");

    for (let country in data) {
      let title = document.createElement("h3");
      title.innerText = country;
      container.appendChild(title);

      data[country].forEach(st => {
        allStations.push(st);

        let div = document.createElement("div");
        div.className = "station";
        div.innerHTML = `
          <img src="${st.logo}" alt="${st.name}">
          <span>${st.name}</span>
        `;

        div.onclick = () => playStation(st);
        container.appendChild(div);
      });
    }

    autoPlayFromURL();
  });

function playStation(st) {
  audio.src = st.stream;
  audio.load();
  audio.play().catch(() => console.log("Kliko ▶️ për ta nisur"));
  document.getElementById("radioName").innerText = st.name;
  document.getElementById("logo").src = st.logo;
}

// Autoplay nga URL (nga bot ose link direkt)
function autoPlayFromURL() {
  const params = new URLSearchParams(window.location.search);
  const streamParam = decodeURIComponent(params.get("stream") || "");
  const nameParam = decodeURIComponent(params.get("name") || "");

  if (streamParam) {
    audio.src = streamParam;
    audio.load();
    audio.play().catch(() => console.log("Kliko ▶️ për ta nisur"));
    document.getElementById("radioName").innerText = nameParam || "Radio Live";
  }
}

// SEARCH
document.getElementById("search").addEventListener("input", function() {
  const val = this.value.toLowerCase();
  const items = document.querySelectorAll(".station");
  items.forEach(item => {
    item.style.display = item.innerText.toLowerCase().includes(val) ? "flex" : "none";
  });
});
</script>

</body>
</html>
